trial: sascert_v1_4_scb_cu_riskmixed_steegformer_physionetmi
runner_reused: workbench/20260623_sascert_softar_ls_v1_1_steegformer_physionetmi/runner_v1_1.py
experiments: [v1_4_regular, v1_4_riskmixed]
backbone: ST-EEGFormer-small
dataset: PhysioNetMI
runs: [R04, R08, R12]
task: left_vs_right_motor_imagery
targets: [90,91,92,93,94,95,96,97,98,99,100,101,102,103,104,105,106,107,108,109]
seeds: [20,21,22,23,24]
source_tuned_checkpoint: outputs/foundation_physio_mi_fullfinetune/checkpoints/st_eegformer_small_seed3407_best.pt
output_dir: workbench/20260623_sascert_v1_4_scb_cu_riskmixed_steegformer_physionetmi/outputs
label_smoothing: 0.10
subject_class_balanced_cu:
  training_weight_inputs: [E_embed, E_proto]
  diagnostic_only_inputs: [artifact_score, E_physio, E_style, E_pred]
  ranknorm_scope: subject_class
  fallback_order: [subject_level, global]
  weight_formula: "w = 0.75 + 0.5 * ranknorm(E_content within subject/class)"
  expected_weight_range: [0.75, 1.25]
  artifact_hard_gate: false
loss:
  augmented_loss: "mean over classes: sum(w_i * CE_i) / (sum(w_i) + eps)"
  total_loss: "CE_real + L_aug"
riskmixed_pool:
  mild_ratio: 0.70
  risky_ratio: 0.30
  risky_augmentations:
    - strong_frequency_mask
    - strong_channel_dropout
    - emg_like_burst
    - eog_like_drift
    - covariance_perturbation
