name: steegformer_physionetmi_sascert
status: completed_diagnostic
protocol: fewshot_target_support_sascert

dataset:
  name: PhysioNetMI
  root: /ai/224duibishiyan/CBraMod-main/tmp_in/MI/files
  task: left_vs_right_motor_imagery
  runs: [4, 8, 12]
  labels:
    T1: left
    T2: right
  window_seconds: 4
  source_train_subjects: [1, 70]
  validation_subjects: [71, 89]
  target_test_subjects: [90, 109]
  support_shot_per_class: 5
  raw_data_copied: false

preprocessing:
  bandpass_hz: [1.0, 40.0]
  per_trial_channel_zscore: true
  target_sfreq: 128
  target_samples: 512

backbone:
  name: ST-EEGFormer-small
  code_path: third_party/backbones/STEEGFormer
  checkpoint: third_party/backbones/STEEGFormer/pretrained_weights/ST-EEGFormer-small/checkpoint-300.pth

method:
  locked_name: SASCert_SoftAR_LS010
  artifact_reject_percentile: 10
  w_min: 0.2
  label_smoothing: 0.10
  score_variant: artifact_gate_content_rank
  forbid_hard_top50: true
  posthoc_decision: >
    On source-tuned ST-EEGFormer-small, SoftAR improved mean Macro-F1 over
    NaiveAug but failed subject/seed reliability and was slightly below
    SoftWeight_noReject. Treat this config as a completed diagnostic, not the
    next active ST method.

groups:
  - NaiveAug_LS010
  - ArtifactReject_LS010
  - SoftWeight_noReject_LS010
  - SASCert_SoftAR_LS010

training:
  seeds: [20, 21, 22, 23, 24]
  tune_hyperparameters: false

metrics:
  - accuracy
  - balanced_accuracy
  - macro_f1
  - kappa
  - auroc
  - ece
  - nll
  - brier
  - subject_win_rate
  - seed_win_rate
  - worst_subject_acc
  - subject_wise_std

go_criteria:
  vs: NaiveAug_LS010
  delta_macro_f1_min: 0.005
  delta_balanced_acc_min: 0.0
  delta_ece_max: 0.01
  delta_nll_max: 0.01
  delta_brier_max: 0.01
  subject_win_rate_macro_f1_min: 0.65
  seed_win_rate_macro_f1_min: 0.65

results:
  original_pretrained_features:
    status: failed_feature_substrate
    output_tag: pretrained_full
    best_group: SASCert_SoftAR_LS010
    sascert_vs_naive:
      delta_balanced_accuracy: 0.012117822725949634
      delta_macro_f1: 0.011587603133753177
      delta_ece: -0.00298185891968189
      subject_win_rate_macro_f1: 0.25
      seed_win_rate_macro_f1: 0.4
    interpretation: all groups near chance; source-tuned feature rerun required
  source_tuned_features:
    status: method_reliability_failed
    state_dict: outputs/foundation_physio_mi_fullfinetune/checkpoints/st_eegformer_small_seed3407_best.pt
    output_tag: st_source_tuned_full
    best_classification_group: SoftWeight_noReject_LS010
    best_calibration_group: SASCert_SoftAR_LS010
    softweight_no_reject:
      balanced_accuracy: 0.7152730485974295
      macro_f1: 0.7109399006315767
      ece: 0.20820253054048213
      nll: 0.6831626502905006
    sascert_softar:
      balanced_accuracy: 0.7149415603402445
      macro_f1: 0.7108272221353755
      ece: 0.20557730164801102
      nll: 0.680976874175939
    sascert_vs_naive:
      delta_balanced_accuracy: 0.006148220866680432
      delta_macro_f1: 0.006289231025346731
      delta_ece: -0.0023313998088696775
      subject_win_rate_macro_f1: 0.25
      seed_win_rate_macro_f1: 0.0
  artifact_gate_diagnostic:
    p90:
      clean_reject_rate: 0.0
      bad_artifact_reject_rate: 0.5
      decision: artifact_gate_precise_but_conservative
    p80:
      clean_reject_rate: 0.0
      bad_artifact_reject_rate: 1.0
      mini_delta_macro_f1_vs_naive: -0.008105624702603453
      decision: detector_clean_but_training_hurts_classification
    p70:
      clean_reject_rate: 0.25
      bad_artifact_reject_rate: 1.0
      decision: artifact_gate_overprunes_clean_or_useful_candidates

next:
  config: configs/experiments/steegformer_physionetmi_softweight_no_reject_confirm.yaml
  rationale: >
    Confirm the ST-specific no-reject soft-weighting branch before promoting
    it or moving to CBraMod PhysioNetMI matched validation.
