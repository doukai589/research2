name: submission_package_quality_review
status: completed
date_created: 2026-06-22
date_completed: 2026-06-22

purpose: >
  Review the generated submission-preparation package for completeness,
  consistency, and remaining manuscript-cleanup tasks before any new scientific
  experiment is considered.

inputs:
