  manifest: outputs/runs/sas_cert_diagnostic_certificate_pack_physionetmi/manuscript_asset_manifest.json
  bibliography_trace: docs/SAS_CERT_BIBLIOGRAPHY_TRACE.md
  submission_clean_draft: docs/SAS_CERT_DIAGNOSTIC_CERTIFICATE_SUBMISSION_DRAFT.md
  generated_tables_dir: outputs/runs/sas_cert_diagnostic_certificate_pack_physionetmi/manuscript_tables
  generated_figures_dir: outputs/runs/sas_cert_diagnostic_certificate_pack_physionetmi/manuscript_figures
  decision: proceed_to_submission_package_quality_review
  next: configs/experiments/submission_package_quality_review.yaml
