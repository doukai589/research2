name: bibliography_and_figure_generation_plan
status: completed
date_created: 2026-06-22
date_completed: 2026-06-22

purpose: >
  Convert the reviewed diagnostic manuscript package into submission-prep
  artifacts by resolving citation placeholders and generating figure/table
  drafts from existing evidence files only.

inputs:
  polished_draft: docs/SAS_CERT_DIAGNOSTIC_CERTIFICATE_DRAFT_POLISHED.md
  package_review: docs/SAS_CERT_DIAGNOSTIC_MANUSCRIPT_PACKAGE_REVIEW.md
  citation_plan: docs/SAS_CERT_CITATION_PLAN.md
  figure_table_plan: docs/SAS_CERT_FIGURE_TABLE_PLAN.md
  evidence_tables_dir: outputs/runs/sas_cert_diagnostic_certificate_pack_physionetmi/tables

outputs:
  bibliography_trace: docs/SAS_CERT_BIBLIOGRAPHY_TRACE.md
  submission_clean_draft: docs/SAS_CERT_DIAGNOSTIC_CERTIFICATE_SUBMISSION_DRAFT.md
  generated_tables_dir: outputs/runs/sas_cert_diagnostic_certificate_pack_physionetmi/manuscript_tables
  generated_figures_dir: outputs/runs/sas_cert_diagnostic_certificate_pack_physionetmi/manuscript_figures

constraints:
  no_new_experiments: true
  no_new_claims_without_traceable_evidence: true
  no_promotion_of_weighting_policy: true
  use_existing_csv_json_only: true

required_work:
