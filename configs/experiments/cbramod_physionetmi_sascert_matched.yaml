failure_review:
  status: completed
  report: workbench/20260622_cbramod_physionetmi_sascert_matched/FAILURE_REVIEW.md
  summary: workbench/20260622_cbramod_physionetmi_sascert_matched/failure_review_summary.json
  decision: revise_cert_calibration
  first_broken_link: current_mixed_bad_sas_score_direction_wrong_on_physionetmi
  score_audit:
    current_sas_clean_vs_bad_auc: 0.19689814814814816
    direction_fixed_total_auc: 0.8911111111111112
    artifact_gate_physio_auc: 0.9022222222222221
    content_inverted: true
    artifact_safe_inverted: true
    physio_inverted: false
