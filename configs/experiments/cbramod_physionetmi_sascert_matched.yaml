final_branch_decision:
  decision: park_cbramod_physionetmi_full_expansion
  reason: >
    Direction repair improves classification, but both repaired and
    temperature-calibrated repaired variants violate the ECE gate. The
    temperature diagnostic selected T=0.5 on every fold and did not solve
    calibration.
