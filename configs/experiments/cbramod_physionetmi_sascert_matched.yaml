name: cbramod_physionetmi_sascert_matched
status: calibration_repair_failed_full_expansion_parked
protocol: fewshot_target_support_sascert_matched_to_st

purpose: >
  Run the CBraMod anchor on the same PhysioNetMI few-shot augmentation protocol
  used for ST-EEGFormer-small, so the two-backbone one-dataset SAS-Cert question
  can be compared without cross-dataset confounding.

scientific_question_link: >
  Tests whether augmented EEG sample certification behaves similarly on the
  CBraMod anchor and the stronger ST-EEGFormer representation under the same
  target-support adaptation protocol.

dataset:
  name: PhysioNetMI
  root: /ai/224duibishiyan/CBraMod-main/tmp_in/MI/files
  task: left_vs_right_motor_imagery
  runs: [4, 8, 12]
  labels:
    T1: left
    T2: right
  window_seconds: 4
  source_train_subjects: [1, 70]
  validation_subjects: [71, 89]
  final_target_subjects: [90, 109]
  support_shot_per_class: 5
  raw_data_copied: false

backbone:
  name: CBraMod
  code_path: third_party/CBraMod-main
  alternate_code_path: ../新研究/CBraMod-main
  checkpoint: third_party/CBraMod-main/pretrained_weights/pretrained_weights.pth
  fallback_checkpoint: ../新研究/CBraMod-main/pretrained_weights/pretrained_weights.pth
  frozen_during_fewshot: true
  expected_input_shape: [channels, patches, samples_per_patch]
  expected_feature_policy: pooled_frozen_encoder_feature

matched_st_reference:
  workbench: workbench/20260622_steegformer_sascert_core
  source_tuned_st_final_output_tag: st_source_tuned_full
  source_tuned_st_dev_output_tag: st_source_tuned_routing_dev
  st_decision: >
    ST source-tuned features are useful, but no ST augmentation method is
    promoted because reliability/routing gates failed.

candidate_methods:
  - NaiveAug_LS010
  - ArtifactReject_LS010
  - SoftWeight_noReject_LS010
  - SASCert_SoftAR_LS010

training:
  seeds: [20, 21, 22, 23, 24]
  source_epochs: 30
  finetune_epochs: 80
  batch_size: 64
  tune_hyperparameters: false

metrics:
  - accuracy
  - balanced_accuracy
  - macro_f1
  - kappa
  - auroc
  - ece
  - nll
  - brier
  - subject_win_rate
  - seed_win_rate

go_criteria:
  primary_vs: NaiveAug_LS010
  delta_macro_f1_min: 0.005
  delta_balanced_acc_min: 0.0
  delta_ece_max: 0.01
  delta_nll_max: 0.01
  delta_brier_max: 0.01
  subject_win_rate_macro_f1_min: 0.65
  seed_win_rate_macro_f1_min: 0.65

constraints:
  no_raw_data_copy: true
  no_target_test_ranking_or_thresholding: true
  no_backbone_training: true
  no_new_dataset: true
  no_new_backbone: true

planned_outputs:
  - workbench/cbramod_physionetmi_sascert_matched/TRIAL.md
  - workbench/cbramod_physionetmi_sascert_matched/outputs/compact_cbramod_physionetmi_sascert_result.json
  - workbench/cbramod_physionetmi_sascert_matched/outputs/CBRAMOD_PHYSIONETMI_SASCERT_REPORT.md

first_step:
  name: cbramod_physionetmi_smoke
  required_checks:
    - resolve_local_cbramod_code_and_checkpoint
    - confirm_physionetmi_loader_reuse_without_copying_raw_data
    - confirm_frozen_cbramod_forward_on_physionetmi_trial
    - confirm_pooled_feature_shape_and_no_nan_inf
  status: passed
  smoke_report: workbench/20260622_cbramod_physionetmi_sascert_matched/outputs/cbramod_smoke_report.json
  observed:
    cache_shape: [4917, 64, 640]
    cbramod_input_shape: [8, 64, 4, 200]
    representation_shape: [8, 64, 4, 200]
    pooled_feature_shape: [8, 200]
    checkpoint_loaded_keys: 211
    checkpoint_model_keys: 211
    missing_after_load: 0
    unexpected_after_load: 0
    shape_mismatch: 0
    feature_nan_count: 0
    feature_inf_count: 0
  resample_policy: PhysioNetMI canonical 640 samples -> CBraMod 800 samples -> [64,4,200]

next_step:
  name: cross_backbone_certificate_direction_audit_or_return_to_st_reliability
  rationale: >
    The bounded failure review found the current mixed-bad SAS score direction
    is wrong on PhysioNetMI. A repaired artifact-gate physio score rescued
    Macro-F1 on the mini matrix, but ECE still failed the calibration gate.
    A support-only temperature scaling diagnostic did not fix calibration and
    worsened NLL/Brier relative to Naive. Do not expand CBraMod PhysioNetMI to
    full targets until there is a new calibration hypothesis. Use the repaired
    score finding for cross-backbone certificate direction analysis or return to
    the ST-EEGFormer reliability branch.

feature_cache:
  status: completed
  cache: workbench/20260622_cbramod_physionetmi_sascert_matched/outputs/cbramod_original_features.npz
  manifest: workbench/20260622_cbramod_physionetmi_sascert_matched/outputs/cbramod_original_features_manifest.json
  features_shape: [4917, 200]
  contains_raw_trial_array: false
  feature_nan_count: 0
  feature_inf_count: 0

